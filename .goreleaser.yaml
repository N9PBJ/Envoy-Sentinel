version: 2

project_name: envoy-sentinel

builds:
  - id: envoy-sentinel
    main: .
    binary: envoy-sentinel
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -H=windowsgui
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: windows
    ids:
      - envoy-sentinel
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      # GoReleaser otherwise adds common documentation files by default. The
      # executable already embeds its icons, so it is the only runtime file.
      - none*

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  prerelease: auto
